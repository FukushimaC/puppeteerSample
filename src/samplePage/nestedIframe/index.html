<!DOCTYPE html>
<html lang="ja">
    <head>

        <title>Puppeteer テストページ</title>
        <style>
            #modal {
                display: none;
                position: fixed;
                top: 30%;
                left: 30%;
                width: 300px;
                padding: 20px;
                background-color: #fff;
                border: 1px solid #aaa;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            }
        </style>
    </head>
    <body>
        <section>
            <h2>フォームテスト(iframe内)</h2>
            <form id="testForm">
                <label for="textInput">テキスト入力:</label>
                <input type="text" id="textInput" name="textInput" /><br /><br />
            </form>
        </section>
    </body>
</html>
