<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>Puppeteer テストページ</title>
        <style>
            #modal {
                display: none;
                position: fixed;
                top: 30%;
                left: 30%;
                width: 300px;
                padding: 20px;
                background-color: #fff;
                border: 1px solid #aaa;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            }
        </style>
    </head>
    <body>
        <h1>Puppeteer 自動化テスト</h1>

        <section>
            <h2>フォームテスト</h2>
            <form id="testForm" method="POST" enctype="multipart/form-data">
                <label for="textInput">テキスト入力:</label>
                <input type="text" id="textInput" name="textInput" /><br /><br />

                <label for="fileInput">ファイルアップロード:</label>
                <input type="file" id="fileInput" name="fileInput" /><br /><br />

                <button type="submit" id="submitButton">送信</button>
            </form>
        </section>

        <section>
            <h2>遅延モーダル</h2>
            <button onclick="showModal()">モーダルを表示</button>
            <div id="modal">
                <p>これは遅延表示されるモーダルです。</p>
                <label><input type="checkbox" id="agreeCheckbox" /> 〇〇に同意する</label
                ><br /><br />
                <button onclick="closeModal()">閉じる</button>
            </div>
        </section>

        <section>
            <h2>単一iframe</h2>
            <iframe
                id="singleFrame"
                srcdoc="<input type='text' id='insideIframe' value='iframeテスト'>"
            ></iframe>
        </section>

        <section>
            <h2>ネストされたiframe</h2>
            <iframe id="outerFrame" src="nestedIframe/index.html"></iframe>
        </section>

        <script>
            function showModal() {
                setTimeout(() => {
                    document.getElementById('modal').style.display = 'block';
                }, 500);
            }

            function closeModal() {
                document.getElementById('modal').style.display = 'none';
            }

            document.getElementById('testForm').addEventListener('submit', (e) => {
                e.preventDefault();
                alert('フォームが送信されました！');
            });
        </script>
    </body>
</html>
